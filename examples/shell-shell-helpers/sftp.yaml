name: sftp
group: shell / shell helpers
references:
  - group: Core Sessions
    items:
      - label: Connect interactively
        command: sftp user@host
        notes: Start an interactive file-transfer session over SSH.
      - label: Connect on custom port
        command: sftp -P 2222 user@host
        notes: Override the default SSH port.
      - label: Use specific identity file
        command: sftp -i ~/.ssh/work_ed25519 user@host
        notes: Select a non-default SSH key for the session.
      - label: Use SSH config alias
        command: sftp prod-web
        notes: "Reuse connection details from `~/.ssh/config`."
      - label: Connect through jump host
        command: sftp -J bastion user@private-host
        notes: Route the session through an SSH jump host.

  - group: Remote Navigation
    items:
      - label: Show remote working directory
        command: pwd
        notes: "Interactive `sftp` command once connected."
      - label: List remote files
        command: ls -lah
        notes: Interactive remote listing with details and hidden files.
      - label: Change remote directory
        command: cd /srv/app
        notes: Navigate on the remote side within the session.
      - label: Create remote directory
        command: mkdir releases
        notes: Make directories without opening a separate SSH shell.
      - label: Remove remote file
        command: rm old.log
        notes: Delete a single remote file from within the session.

  - group: Local Navigation Inside Session
    items:
      - label: Show local working directory
        command: lpwd
        notes: "`l*` commands operate on the local machine from inside `sftp`."
      - label: List local files
        command: lls -lah
        notes: Inspect local paths without leaving the session.
      - label: Change local directory
        command: lcd ./dist
        notes: Set the default local source or destination directory.
      - label: Create local directory
        command: lmkdir ./downloads
        notes: Make a local directory from within interactive SFTP.
      - label: Run local shell command
        command: "!pwd"
        notes: "Prefix with `!` to execute a local shell command temporarily."

  - group: Transfers
    items:
      - label: Download one file
        command: get app.log
        notes: Copy a remote file into the current local directory.
      - label: Upload one file
        command: put app.env
        notes: Copy a local file into the current remote directory.
      - label: Download recursively
        command: get -r releases
        notes: Pull an entire remote directory tree.
      - label: Upload recursively
        command: put -r ./site
        notes: Push a local directory tree to the remote side.
      - label: Resume partial download
        command: reget bigfile.iso
        notes: Continue downloading a partially transferred local file.
      - label: Resume partial upload
        command: reput bigfile.iso
        notes: Continue uploading a partially transferred remote file.

  - group: Batch and Automation
    items:
      - label: Run batch file
        command: sftp -b commands.sftp user@host
        notes: Execute a scripted sequence of SFTP commands non-interactively.
      - label: Feed one command from stdin
        command: printf 'ls -lah\n' | sftp user@host
        notes: Simple way to automate inspection or one-off transfers.
      - label: Quiet batch mode
        command: sftp -q -b commands.sftp user@host
        notes: Reduce progress chatter in automation logs.
      - label: Limit bandwidth
        command: sftp -l 5000 user@host
        notes: "Bandwidth limit is in Kbit/s, similar to `scp`."
      - label: Preserve attributes on upload
        command: put -P file.txt
        notes: Preserve permissions and access or modification times when supported.

  - group: Troubleshooting and Practical Notes
    items:
      - label: Verbose connection debug
        command: sftp -vvv user@host
        notes: Useful for auth and routing problems, just like verbose SSH.
      - label: Show version help
        command: sftp -h
        notes: Quick flag reference for the installed client.
      - label: Prefer sftp over scp for browsing
        value: "`sftp` is better when you need remote navigation before transfer."
        notes: It combines inspection and copy operations in one session.
      - label: Prefer rsync for large repeated syncs
        value: "`rsync` is better for mirroring, deletes, filters, and incremental transfer."
        notes: SFTP is not a directory synchronization tool.
      - label: Host alias and key behavior
        value: SFTP inherits SSH config, host keys, agent use, and jump-host behavior.
        notes: Most auth and host setup knowledge transfers directly from SSH.
