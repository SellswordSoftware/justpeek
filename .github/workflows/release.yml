name: Build And Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            args: ""
          - name: windows-x64
            runner: windows-2022
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          NO_STRIP: ${{ runner.os == 'Linux' && '1' || '' }}
        with:
          args: ${{ matrix.args }}

      - name: Build And Publish Tauri app
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: ${{ runner.os == 'Linux' && '1' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ format('JustPeek {0}', github.ref_name) }}
          releaseBody: See the assets to download this version and install.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-bundle
          path: src-tauri/target/release/bundle/
          if-no-files-found: error

      - name: Upload Windows portable artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-portable-exe
          path: src-tauri/target/release/justpeek.exe
          if-no-files-found: error

      - name: Publish Windows portable exe
        if: ${{ runner.os == 'Windows' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/release/justpeek.exe
