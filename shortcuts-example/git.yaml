name: Git Reference
group: CLI
process:
  - wezterm
  - alacritty
  - gnome-terminal
references:
  - group: Tagging
    items:
      - label: Annotated tag
        command: git tag -a v1.2.3 -m "Release v1.2.3"
      - label: Push tags
        command: git push --tags
  - group: Rollback
    items:
      - label: Revert a commit
        command: git revert <commit>
        notes: Safe for shared history
      - label: Reset hard
        command: git reset --hard <commit>
        notes: Rewrites local state
