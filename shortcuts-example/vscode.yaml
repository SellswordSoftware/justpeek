name: VS Code
group: Editors
process:
  - code
  - Code
references:
  - group: Navigation
    items:
      - keys: Ctrl+P
        label: Quick Open
        notes: Opens a file by name
      - keys: Ctrl+Shift+P
        label: Command Palette
      - keys: Ctrl+Shift+N
        label: New Window
      - keys: Ctrl+W
        label: Close Window
  - group: Editing
    items:
      - keys: Alt+Up
        label: Move line up
      - keys: Alt+Down
        label: Move line down
      - keys: Shift+Alt+Arrow
        label: Copy line up/down
  - group: View
    items:
      - keys: Ctrl+B
        label: Toggle Sidebar
      - keys: Ctrl+J
        label: Toggle Panel
      - keys: Ctrl+Shift+E
        label: Focus Explorer
